services:
  zookeeper:
    image: bitnami/zookeeper:3.8
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    networks:
      - iot_net

  kafka:
    image: bitnami/kafka:3.6
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - iot_net

  # object storage compatible with S3
  minio:
    image: minio/minio:RELEASE.2024-10-07T00-00-00Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    networks:
      - iot_net

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - iot_net

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=iot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iot_net

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iot_net

  scrapper:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      args:
        - SERVICE=scrapper
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ../configs/scrapper.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    networks:
      - iot_net

  processor:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      args:
        - SERVICE=processor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ../configs/processor.yaml:/app/config.yaml:ro
    networks:
      - iot_net

  alerter:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      args:
        - SERVICE=alerter
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage:
        condition: service_started
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ../configs/alerter.yaml:/app/config.yaml:ro
    networks:
      - iot_net

  storage:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      args:
        - SERVICE=storage
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ../configs/storage.yaml:/app/config.yaml:ro
    networks:
      - iot_net

networks:
  iot_net:
    driver: bridge

volumes:
  minio_data:
  mongo_data:
  postgres_data:
  redis_data:
